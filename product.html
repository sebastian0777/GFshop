<body>`r`n<div class="bg-monogram"></div>
  <div class="bg-noise"></div>
  <div class="bg-shape bg-shape-one"></div>
  <div class="bg-shape bg-shape-two"></div>
  <div class="bg-shape bg-shape-three"></div>

  <header class="site-header">
    <div class="brand-wrap">
      <a href="index.html" class="brand-link">
        <img src="assets/logo-gfshop.png" alt="GF Shop" class="brand-logo brand-logo-animated" />
      </a>
    </div>
    <div class="top-search-wrap"><a class="btn btn-soft" href="index.html">Volver al catalogo</a></div>
    <nav class="site-nav">
      <a href="index.html#catalogo">Productos</a>
      <button id="openCart" class="cart-btn">Carrito (<span id="cartCount">0</span>)</button>
    </nav>
  </header>

  <main>
    <section id="productDetail" class="detail-wrap"></section>

    <section class="catalog-section">
      <div class="catalog-head">
        <h2>Productos similares</h2>
      </div>
      <div id="similarGrid" class="products-grid"></div>
    </section>
  </main>

  <aside id="cartDrawer" class="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h3>Tu carrito</h3>
      <button id="closeCart" class="icon-btn" aria-label="Cerrar">x</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-footer cart-footer-col">
      <div class="cart-summary">
        <div><span>Subtotal</span><strong id="cartSubtotal">$0</strong></div>
        <div><span>Envio</span><strong id="cartShipping">$0</strong></div>
        <div class="cart-summary-total"><span>Total</span><strong id="cartTotal">$0</strong></div>
      </div>
      <small id="cartInfo">Tu carrito se guarda automaticamente.</small>
      <button id="checkoutBtn" class="btn btn-primary full">Pagar ahora</button>
    </div>
  </aside>
  <div id="cartOverlay" class="cart-overlay"></div>

  <div id="checkoutModal" class="checkout-modal" aria-hidden="true">
    <div class="checkout-backdrop" data-close-checkout="true"></div>
    <section class="checkout-panel" role="dialog" aria-modal="true" aria-labelledby="checkoutTitle">
      <div class="checkout-head">
        <h3 id="checkoutTitle">Finalizar compra</h3>
        <button id="closeCheckout" class="icon-btn" type="button" aria-label="Cerrar checkout">x</button>
      </div>
      <form id="checkoutForm" class="checkout-form">
        <label>Nombre completo
          <input name="fullName" type="text" required />
        </label>
        <label>Correo electrónico
          <input name="email" type="email" required />
        </label>
        <label>Teléfono (opcional)
          <input name="phone" type="tel" />
        </label>
        <label>Dirección de entrega
          <input name="addressLine1" type="text" required />
        </label>
        <div class="checkout-grid">
          <label>Ciudad
            <input name="city" type="text" value="Bogota" required />
          </label>
          <label>Código postal (opcional)
            <input name="postalCode" type="text" />
          </label>
        </div>
        <button id="confirmCheckout" class="btn btn-primary full" type="submit">Ir a pagar</button>
      </form>
    </section>
  </div>

  <script src="catalog-data.js"></script>
  <script src="product.js"></script>
</body>
</html>
